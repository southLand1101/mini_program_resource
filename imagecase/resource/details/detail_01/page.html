<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>The Art of Retouching</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-main: #ffffff;
            --text-sub: #888888;
            --accent: #c5a880; /* 奢华淡金 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* 艺术感页头 */
        header {
            padding: 40px 24px 20px;
            text-align: center;
            border-bottom: 1px solid #1a1a1a;
        }

        header h1 {
            font-size: 24px;
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        header p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
        }

        /* 核心画廊区域 */
        .gallery-container {
            padding: 24px 0;
        }

        .section-title {
            padding: 0 24px;
            margin-bottom: 20px;
        }

        .section-title h2 {
            font-size: 18px;
            font-weight: 400;
            letter-spacing: 2px;
            position: relative;
            display: inline-block;
        }

        .section-title h2::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 20px;
            height: 1px;
            background-color: var(--accent);
        }

        /* 横向滚动风格卡片 */
        .style-slider {
            display: flex;
            flex-direction: column;
            /* overflow-x: auto;
            scroll-snap-type: x mandatory; */
            padding: 0 24px 20px;
            gap: 20px;
            scrollbar-width: none; /* Firefox */
        }

        .style-slider::-webkit-scrollbar {
            display: none; /* Chrome Safari */
        }

        .style-card {
            flex: 0 0 85%;
            scroll-snap-align: center;
            background: #121212;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #1f1f1f;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .image-wrapper {
            position: relative;
            width: 100%;
            padding-top: 125%; /* 4:5 黄金比例 */
            background: #1a1a1a;
            overflow: hidden;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(20%); /* 增加一点高级灰感 */
            transition: transform 0.5s ease;
        }

        .style-info {
            padding: 20px;
        }

        .style-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--accent);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .style-concept {
            font-size: 13px;
            color: var(--text-sub);
            text-align: justify;
        }

        /* 力度对比区域 */

        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px 24px;
            font-size: 11px;
            color: #444;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- 页头 -->
    <header>
        <h1>STYLE NARRATIVE</h1>
        <p>风格叙事</p>
    </header>

    <!-- 单元一：修图风格展示 -->
    <div class="gallery-container">
        
        <div class="style-slider">
            <!-- 胶片风格 -->
            <div class="style-card">
                <div class="image-wrapper">
                    <img src="./demo.jpg" alt="复古胶片风格">
                </div>
                <div class="style-info">
                    <div class="style-name">复古胶片 / Film Tone</div>
                    <div class="style-concept">
                        <strong>修图思路：</strong>模拟颗粒质感与青中带绿的暗部。故意降低高光纯度，让色彩带上时间的沉淀感。不追求绝对的清晰，而追求故事的呼吸感。
                    </div>
                </div>
            </div>

            <!-- 通透纯净 -->
            <div class="style-card">
                <div class="image-wrapper">
                    <img src="./demo.jpg" alt="通透纯净风格">
                </div>
                <div class="style-info">
                    <div class="style-name">通透纯净 / Clean Clear</div>
                    <div class="style-concept">
                        <strong>修图思路：</strong>校正皮肤杂色，提高光影的清透度。重点在于“去黄去噪”，让皮肤呈现剥壳鸡蛋般的自然光泽，像清晨拂面的一阵凉风。
                    </div>
                </div>
            </div>

            <!-- 高饱和高级感 -->
            <div class="style-card">
                <div class="image-wrapper">
                    <img src="./demo.jpg" alt="高饱和色彩艺术">
                </div>
                <div class="style-info">
                    <div class="style-name">盛夏意象 / High Saturation</div>
                    <div class="style-concept">
                        <strong>修图思路：</strong>高饱和并不意味着廉价。我们精准提取并放大主体色彩（如红、蓝、绿），同时压暗背景，制造强烈的视觉冲击与情绪张力。
                    </div>
                </div>
            </div>
        </div>
    </div>

   

    

</body>
</html>
