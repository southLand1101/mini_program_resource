  </form>

  <script>
    document.getElementById("form").onsubmit = async (e) => {
      e.preventDefault();

      const form = new FormData(e.target);

      const data = {
        name: form.get("name"),
        contact: form.get("contact"),
        date: form.get("date"),
        note: form.get("note")
      };

      const res = await fetch("https://young-poetry-83ff.south-land.workers.dev/api/submit", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
      });

      alert("提交成功");
      e.target.reset();
    };
  </script>
